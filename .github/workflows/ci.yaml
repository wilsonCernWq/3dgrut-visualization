name: Continuous Integration

env:
  DEBIAN_FRONTEND: noninteractive

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}:${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install formatter dependencies
        run: pip install black==26.3.1 isort==5.13.0
      - name: Check code style
        run: bash formatter.sh --check

  build-linux:
    name: UV Linux
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
    env:
      CUDA_VERSION: "12.8.1"
      CMAKE_CUDA_ARCHITECTURES: "90" # random arch for testing install
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # when set to "true" but frees about 6 GB
          tool-cache: true
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.34
        id: cuda-toolkit
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: network
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install OpenGL development libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl-dev libgl-dev libgles-dev libglx-dev libopengl-dev
      - name: Build Standalone
        run: |
          git config --global --add safe.directory "$(pwd)"
          bash ./build_visualization.sh
      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.11"
          enable-cache: "true"
      - name: Build with UV on Linux
        run: |
          uv sync

  build-windows:
    name: UV Windows
    runs-on: windows-latest
    strategy:
      fail-fast: true
    env:
      CUDA_VERSION: "12.8.1"
      CMAKE_CUDA_ARCHITECTURES: "90" # random arch for testing install
    steps:
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64  # Options: x86, x64, arm64
      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.34
        id: cuda-toolkit
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: network
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Standalone Build on Windows
        shell: pwsh
        run: |
          .\build_visualization.ps1
      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.11"
          enable-cache: "true"
      - name: Build with UV on Windows
        shell: pwsh
        run: |
          uv sync
